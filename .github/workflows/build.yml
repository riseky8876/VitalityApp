name: 🏗️ Build Vitality APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug / release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Build Debug APK
  # ──────────────────────────────────────────
  build-debug:
    name: 🐛 Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📋 Grant execute permission untuk Gradle
        run: chmod +x gradlew

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx4g"

      - name: 📦 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vitality-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 📊 Show APK info
        run: find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

  # ──────────────────────────────────────────
  # JOB 2: Build Release APK
  # ──────────────────────────────────────────
  build-release:
    name: 🚀 Build Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📋 Grant execute permission
        run: chmod +x gradlew

      - name: 🔑 Decode Keystore (jika ada)
        # Hanya decode jika secret KEYSTORE_BASE64 sudah diisi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/vitality-release.keystore
            echo "KEYSTORE_EXISTS=true" >> $GITHUB_ENV
            echo "✅ Keystore decoded"
          else
            echo "KEYSTORE_EXISTS=false" >> $GITHUB_ENV
            echo "⚠️  No keystore secret found, building unsigned"
          fi

      - name: 🏗️ Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: 📦 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vitality-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

  # ──────────────────────────────────────────
  # JOB 3: Auto Release saat tag v* dibuat
  # ──────────────────────────────────────────
  create-release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-debug, build-release]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📋 Grant execute permission
        run: chmod +x gradlew

      - name: 🏗️ Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

      - name: 🏷️ Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Vitality ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🌿 Vitality ${{ steps.version.outputs.VERSION }}

            ### ✨ Fitur
            - 🌀 Vitality Ring — skor kesehatan 0-100 dengan animasi
            - 🔋 Analisis baterai mendalam (kapasitas, siklus, suhu)
            - 💾 Monitor RAM + zRAM
            - 📦 Kesehatan & estimasi umur storage
            - ⚡ Detektor aplikasi boros daya
            - 🧹 Optimasi 1-tap (cache + memori)
            - 📊 Riwayat kesehatan harian

            ### 📱 Kompatibilitas
            - Android 8.0+ (API 26+)
            - Root opsional (KernelSU / Magisk)

            ### 📥 Cara Install
            1. Download `vitality-release.apk` di bawah
            2. Aktifkan "Install dari sumber tidak dikenal"
            3. Install dan nikmati!
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
