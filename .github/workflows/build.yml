name: 🏗️ Build Vitality APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug / release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Build Debug APK
  # ──────────────────────────────────────────
  build-debug:
    name: 🐛 Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      # FIX 1: Otomatis download gradle-wrapper.jar jika tidak ada di repo
      - name: 🛠️ Restore Gradle Wrapper JAR
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "JAR tidak ditemukan, mendownload dari sumber resmi..."
            mkdir -p gradle/wrapper
            curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          else
            echo "Gradle Wrapper JAR sudah ada."
          fi

      - name: 📋 Grant execute permission untuk Gradle
        run: chmod +x gradlew

      - name: 🔍 Validasi project structure
        run: |
          echo "=== Project files ==="
          ls -la
          echo "=== App module ==="
          ls -la app/
          echo "=== Gradle version ==="
          ./gradlew --version

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true -Xmx4g"

      - name: 📦 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vitality-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ──────────────────────────────────────────
  # JOB 2: Build Release APK
  # ──────────────────────────────────────────
  build-release:
    name: 🚀 Build Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      # FIX 1: Restore JAR untuk job release
      - name: 🛠️ Restore Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: 📋 Grant execute permission
        run: chmod +x gradlew

      - name: 🔑 Setup Keystore (jika ada secrets)
        # FIX 2: Perbaikan sintaks 'if' (tanpa kurung kurawal ${{ }})
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode >
