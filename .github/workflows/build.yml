name: 🏗️ Build Vitality APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  # Bisa juga trigger manual dari tab Actions
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug / release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Build Debug APK (selalu jalan)
  # ──────────────────────────────────────────
  build-debug:
    name: 🐛 Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📋 Grant execute permission untuk Gradle
        run: chmod +x gradlew

      - name: 🔍 Validasi project structure
        run: |
          echo "=== Project files ==="
          ls -la
          echo "=== App module ==="
          ls -la app/
          echo "=== Gradle version ==="
          ./gradlew --version

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true -Xmx4g"

      - name: 📦 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vitality-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 📊 Show APK info
        run: |
          echo "=== APK Build Results ==="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

  # ──────────────────────────────────────────
  # JOB 2: Build Release APK (hanya di main/master)
  # ──────────────────────────────────────────
  build-release:
    name: 🚀 Build Release APK
    runs-on: ubuntu-latest
    # Hanya build release saat push ke main atau manual trigger
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📋 Grant execute permission
        run: chmod +x gradlew

      - name: 🔑 Setup Keystore (jika ada secrets)
        # Hanya jalan jika keystore sudah disetup di GitHub Secrets
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/vitality-release.keystore
          echo "Keystore decoded successfully"

      - name: 🏗️ Build Release APK (unsigned)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

      - name: 🏗️ Build Release APK (signed)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: 📦 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vitality-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

  # ──────────────────────────────────────────
  # JOB 3: Auto Release saat tag v* dibuat
  # ──────────────────────────────────────────
  create-release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-debug, build-release]
    # Hanya jalan saat push tag seperti v1.0.0
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📋 Grant execute permission
        run: chmod +x gradlew

      - name: 🏗️ Build Release APK untuk GitHub Release
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

      - name: 🏷️ Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 📝 Generate Release Notes
        id: release_notes
        run: |
          cat << 'EOF' > release_notes.md
          ## 🌿 Vitality ${{ steps.version.outputs.VERSION }}

          ### ✨ Fitur
          - 🌀 Vitality Ring — skor kesehatan 0-100 dengan animasi
          - 🔋 Analisis baterai mendalam (kapasitas, siklus, suhu)
          - 💾 Monitor RAM + zRAM
          - 📦 Kesehatan & estimasi umur storage
          - ⚡ Detektor aplikasi boros daya
          - 🧹 Optimasi 1-tap (cache + memori)
          - 📊 Riwayat kesehatan harian

          ### 📱 Kompatibilitas
          - Android 8.0+ (API 26+)
          - Root opsional (KernelSU / Magisk untuk data lebih lengkap)

          ### 📥 Cara Install
          1. Download `vitality-release.apk` di bawah
          2. Aktifkan "Install dari sumber tidak dikenal" di pengaturan
          3. Install dan nikmati!
          EOF

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Vitality ${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
